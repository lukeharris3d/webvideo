<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAFE-NSW</title>

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
      /* Remove page borders/margins */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      /* Container for positioning the custom button over the video */
      .video-container {
        position: relative;
        width: 1280px;
        max-width: 100%;
        height: 720px;
        max-height: 100%;
      }

      .video-js {
        width: 100% !important;
        height: 100% !important;
      }

      /* The Custom Unmute Button */
      #unmute-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 15px 30px;
        border: 2px solid #fff;
        border-radius: 50px;
        cursor: pointer;
        font-family: Arial, sans-serif;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.3s ease;
      }

      #unmute-overlay:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Simple Speaker Icon using CSS */
      .speaker-icon {
        width: 20px;
        height: 20px;
        background: currentColor;
        clip-path: polygon(0% 30%, 30% 30%, 70% 0%, 70% 100%, 30% 70%, 0% 70%);
      }
    </style>
  </head>
  <body>
    <div class="video-container">
      <!-- Unmute Overlay Button -->
      <button id="unmute-overlay">
        <div class="speaker-icon"></div>
        UNMUTE AUDIO
      </button>

      <video
        id="my-video"
        class="video-js vjs-big-play-centered"
        controls
        preload="auto"
        muted
        playsinline
        data-setup='{"autoplay": "muted"}'
      >
        <source
          src="https://lukeharris3d.github.io/webvideo/unreal1.webm"
          type="video/webm"
        />
      </video>
    </div>

    <!-- Video.js Library -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
      var player = videojs("my-video");
      var unmuteBtn = document.getElementById("unmute-overlay");

      // When the custom button is clicked
      unmuteBtn.addEventListener("click", function () {
        // Unmute the video
        player.muted(false);

        // Set volume to 50% just in case
        player.volume(0.5);

        // Hide the button
        unmuteBtn.style.display = "none";
      });

      // Optional: If the user unmutes using the standard player controls, hide our button too
      player.on("volumechange", function () {
        if (!player.muted()) {
          unmuteBtn.style.display = "none";
        }
      });
    </script>
  </body>
</html>
