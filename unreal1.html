<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unreal Planes</title>

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
      /* Remove page borders/margins */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      /* Container for the video */
      .video-container {
        position: relative;
        width: 1280px;
        max-width: 100%;
        height: 720px;
        max-height: 100%;
      }

      .video-js {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div class="video-container">
      <video
        id="my-video"
        class="video-js vjs-big-play-centered"
        controls
        preload="auto"
        muted
        autoplay
        playsinline
        data-setup='{
          "autoplay": true, 
          "muted": true,
          "controlBar": {
            "volumePanel": false
          }
        }'
      >
        <source
          src="https://lukeharris3d.github.io/webvideo/unreal1.webm"
          type="video/webm"
        />
      </video>
    </div>

    <!-- Requested Minimal Video.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal.js"></script>

    <script>
      // Initialize the player
      var player = videojs("my-video");

      // Force play as a fallback in case the browser blocks the attribute
      player.ready(function() {
        player.play();
      });
    </script>
  </body>
</html>
